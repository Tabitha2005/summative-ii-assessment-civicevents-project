<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Form — CivicEvents+</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="css/custom.css">
  <script src="js/config.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <div id="nav-placeholder"></div>

  <main class="flex-1 max-w-2xl mx-auto w-full px-4 py-8">
    <a id="back-btn" href="events.html" class="inline-flex items-center gap-1 text-indigo-600 text-sm hover:underline mb-6">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Back
    </a>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 auth-card">
      <h1 id="form-title" class="text-xl font-bold text-gray-800 mb-6">Create Event</h1>
      <form id="event-form" enctype="multipart/form-data" novalidate>

        <div class="mb-5">
          <label for="title" class="block text-sm font-medium text-gray-700 mb-1.5">Title <span class="text-red-500">*</span></label>
          <input id="title" name="title" type="text" required class="form-input" placeholder="Event title">
        </div>

        <div class="mb-5">
          <label for="description" class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
          <textarea id="description" name="description" rows="4" class="form-input" placeholder="Describe the event..."></textarea>
        </div>

        <div class="mb-5">
          <label for="location" class="block text-sm font-medium text-gray-700 mb-1.5">Location <span class="text-red-500">*</span></label>
          <input id="location" name="location" type="text" required class="form-input" placeholder="City Hall, Room 101">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">
          <div>
            <label for="starts_at" class="block text-sm font-medium text-gray-700 mb-1.5">Starts At <span class="text-red-500">*</span></label>
            <input id="starts_at" name="starts_at" type="datetime-local" required class="form-input">
          </div>
          <div>
            <label for="ends_at" class="block text-sm font-medium text-gray-700 mb-1.5">Ends At <span class="text-red-500">*</span></label>
            <input id="ends_at" name="ends_at" type="datetime-local" required class="form-input">
          </div>
        </div>

        <!-- Image upload -->
        <div class="mb-5">
          <label for="image" class="block text-sm font-medium text-gray-700 mb-1.5">Event Image</label>
          <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 text-center hover:border-indigo-300 transition cursor-pointer" id="image-drop-zone">
            <input id="image" name="image" type="file" accept="image/jpeg,image/png,image/gif" class="hidden" aria-describedby="image-hint">
            <label for="image" class="cursor-pointer">
              <svg class="w-8 h-8 text-gray-300 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <p class="text-sm text-gray-500">Click to upload or drag & drop</p>
              <p id="image-hint" class="text-xs text-gray-400 mt-1">JPG, PNG, GIF — max 10MB</p>
            </label>
          </div>
          <img id="img-preview" src="" alt="Image preview" class="hidden mt-3 rounded-xl max-h-48 object-cover w-full">
        </div>

        <!-- Published toggle -->
        <div class="mb-6 flex items-center gap-3 p-4 bg-gray-50 rounded-xl">
          <input id="published" name="published" type="checkbox" class="w-4 h-4 accent-indigo-600" aria-label="Published">
          <div>
            <label for="published" class="text-sm font-medium text-gray-700 cursor-pointer">Publish immediately</label>
            <p class="text-xs text-gray-400">Unpublished events are only visible to admins.</p>
          </div>
        </div>

        <progress id="upload-progress" class="hidden mb-4" value="0" max="100" aria-label="Upload progress"></progress>

        <div class="flex gap-3">
          <button id="submit-btn" type="submit" class="btn-primary">Save Event</button>
          <a href="events.html" class="px-5 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-600 hover:bg-gray-50 transition">Cancel</a>
        </div>
      </form>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/events.js"></script>
  <script>
    $(function () {
      setupAjax();
      if (isAdmin()) $('#back-btn').attr('href', 'dashboard.html').text('← Back to Dashboard');
      $('#nav-placeholder').load('partials/nav.html');
      $('#footer-placeholder').load('partials/footer.html');
    });
  </script>
</body>
</html>
