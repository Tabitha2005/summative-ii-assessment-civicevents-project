<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Registrations — CivicEvents+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="css/custom.css">
  <script src="js/config.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <div id="nav-placeholder"></div>

  <!-- ═══ HERO ═══ -->
  <div class="page-hero hero-registrations hero-dots">
    <!-- Glowing orbs -->
    <div class="absolute top-0 right-0 w-80 h-80 bg-emerald-400/20 rounded-full blur-3xl -translate-y-1/3 translate-x-1/4 pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-56 h-56 bg-teal-400/15 rounded-full blur-2xl pointer-events-none"></div>

    <!-- Ticket decoration -->
    <div class="absolute right-8 top-1/2 -translate-y-1/2 hidden lg:block opacity-10 pointer-events-none" aria-hidden="true">
      <svg width="120" height="80" viewBox="0 0 120 80" fill="none">
        <rect x="2" y="2" width="116" height="76" rx="8" stroke="white" stroke-width="3" stroke-dasharray="8 4"/>
        <circle cx="2" cy="40" r="10" fill="white"/>
        <circle cx="118" cy="40" r="10" fill="white"/>
        <line x1="30" y1="2" x2="30" y2="78" stroke="white" stroke-width="2" stroke-dasharray="6 4"/>
      </svg>
    </div>

    <div class="hero-content max-w-7xl mx-auto px-4 sm:px-6 pt-12 pb-16 sm:pt-16 sm:pb-20">
      <div class="flex items-center gap-2 text-emerald-300 text-xs font-medium mb-4">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span>Home</span><span class="text-emerald-500">›</span><span class="text-white">My Registrations</span>
      </div>

      <div class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-sm border border-white/20 text-white text-xs font-semibold px-3 py-1.5 rounded-full mb-4">
        <span class="text-base">🎟️</span> Your Event Tickets
      </div>
      <h1 class="text-3xl sm:text-4xl lg:text-5xl font-extrabold text-white leading-tight mb-3" style="font-family:'Plus Jakarta Sans',sans-serif">
        My Registrations
      </h1>
      <p class="text-emerald-200 text-sm sm:text-base max-w-lg leading-relaxed">
        All the civic events you've signed up for — upcoming and past — in one place.
      </p>

      <!-- Quick stats row -->
      <div class="flex gap-4 mt-6 flex-wrap">
        <div class="bg-white/10 backdrop-blur-sm border border-white/15 rounded-xl px-4 py-2.5 flex items-center gap-2">
          <span class="text-emerald-300 text-lg">✅</span>
          <div>
            <p class="text-white text-xs font-semibold">Registered</p>
            <p class="text-emerald-300 text-[11px]">Active events</p>
          </div>
        </div>
        <div class="bg-white/10 backdrop-blur-sm border border-white/15 rounded-xl px-4 py-2.5 flex items-center gap-2">
          <span class="text-slate-300 text-lg">🕐</span>
          <div>
            <p class="text-white text-xs font-semibold">Past Events</p>
            <p class="text-emerald-300 text-[11px]">Leave feedback</p>
          </div>
        </div>
      </div>
    </div>

    <div class="hero-blur-panel"></div>
    <div class="hero-wave">
      <svg viewBox="0 0 1440 48" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M0 24L60 21.3C120 18.7 240 13.3 360 13.3C480 13.3 600 18.7 720 21.3C840 24 960 24 1080 21.3C1200 18.7 1320 13.3 1380 10.7L1440 8V48H1380C1320 48 1200 48 1080 48C960 48 840 48 720 48C600 48 480 48 360 48C240 48 120 48 60 48H0Z" fill="#f8fafc"/>
      </svg>
    </div>
  </div>

  <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-8">
    <div id="my-registrations" class="flex flex-col gap-4"></div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/registrations.js"></script>
  <script>
    $(function () {
      setupAjax();
      authGuard();
      $('#nav-placeholder').load('partials/nav.html');
      $('#footer-placeholder').load('partials/footer.html');
    });
  </script>
</body>
</html>
