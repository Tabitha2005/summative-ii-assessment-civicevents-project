<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — CivicEvents+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="css/custom.css">
  <script src="js/config.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <div id="nav-placeholder"></div>

  <!-- ═══ HERO ═══ -->
  <div class="page-hero hero-notifications hero-dots">
    <!-- Glowing orbs -->
    <div class="absolute top-0 right-1/3 w-72 h-72 bg-amber-500/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-0 left-1/4 w-48 h-48 bg-orange-500/10 rounded-full blur-2xl pointer-events-none"></div>

    <!-- Concentric ring decoration -->
    <div class="absolute right-12 top-1/2 -translate-y-1/2 hidden lg:block pointer-events-none opacity-10" aria-hidden="true">
      <div class="w-32 h-32 rounded-full border-2 border-white absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
      <div class="w-48 h-48 rounded-full border border-white/60 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
      <div class="w-64 h-64 rounded-full border border-white/30 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
      <div class="w-16 h-16 rounded-full bg-white/20 flex items-center justify-center absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-2xl">🔔</div>
    </div>

    <div class="hero-content max-w-7xl mx-auto px-4 sm:px-6 pt-12 pb-16 sm:pt-16 sm:pb-20">
      <div class="flex items-center gap-2 text-slate-400 text-xs font-medium mb-4">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span>Home</span><span class="text-slate-600">›</span><span class="text-white">Notifications</span>
      </div>

      <div class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-sm border border-white/20 text-white text-xs font-semibold px-3 py-1.5 rounded-full mb-4">
        <span class="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></span>
        Live Updates
      </div>
      <h1 class="text-3xl sm:text-4xl lg:text-5xl font-extrabold text-white leading-tight mb-3" style="font-family:'Plus Jakarta Sans',sans-serif">
        Notifications
      </h1>
      <p class="text-slate-400 text-sm sm:text-base max-w-lg leading-relaxed">
        Stay informed with the latest updates, event alerts, and announcements from your city.
      </p>

      <!-- Type legend -->
      <div class="flex gap-3 mt-6 flex-wrap">
        <span class="inline-flex items-center gap-1.5 bg-indigo-500/20 border border-indigo-500/30 text-indigo-300 text-xs font-medium px-3 py-1.5 rounded-full">🗓 Events</span>
        <span class="inline-flex items-center gap-1.5 bg-amber-500/20 border border-amber-500/30 text-amber-300 text-xs font-medium px-3 py-1.5 rounded-full">📢 Announcements</span>
        <span class="inline-flex items-center gap-1.5 bg-pink-500/20 border border-pink-500/30 text-pink-300 text-xs font-medium px-3 py-1.5 rounded-full">🎬 Promos</span>
        <span class="inline-flex items-center gap-1.5 bg-purple-500/20 border border-purple-500/30 text-purple-300 text-xs font-medium px-3 py-1.5 rounded-full">📡 Broadcast</span>
      </div>
    </div>

    <div class="hero-blur-panel"></div>
    <div class="hero-wave">
      <svg viewBox="0 0 1440 48" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M0 40L120 34.7C240 29.3 480 18.7 720 16C960 13.3 1200 18.7 1320 21.3L1440 24V48H1320C1200 48 960 48 720 48C480 48 240 48 120 48H0Z" fill="#f8fafc"/>
      </svg>
    </div>
  </div>

  <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-8" id="notifications-page">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
      <div id="notif-list"></div>
    </div>
    <div class="flex items-center justify-center gap-3 mt-8">
      <button id="prev-page" class="px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-medium hover:bg-indigo-50 hover:border-indigo-300 hover:text-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed shadow-sm transition" aria-label="Previous page">← Prev</button>
      <span id="page-info" class="text-sm text-slate-500 font-medium px-2"></span>
      <button id="next-page" class="px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-medium hover:bg-indigo-50 hover:border-indigo-300 hover:text-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed shadow-sm transition" aria-label="Next page">Next →</button>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/notifications.js"></script>
  <script>
    $(function () {
      setupAjax();
      authGuard();
      $('#nav-placeholder').load('partials/nav.html');
      $('#footer-placeholder').load('partials/footer.html');
    });
  </script>
</body>
</html>
