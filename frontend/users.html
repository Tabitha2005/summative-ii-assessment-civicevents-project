<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — CivicEvents+</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="css/custom.css">
  <script src="js/config.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <div id="nav-placeholder"></div>

  <div class="page-hero hero-events hero-dots relative">
    <div class="max-w-7xl mx-auto px-6 py-10 text-white relative z-10 flex items-center justify-between flex-wrap gap-4">
      <div>
        <h1 class="text-2xl sm:text-3xl font-extrabold mb-1">👥 User Management</h1>
        <p class="text-indigo-200 text-sm">Enable or disable user accounts. Role changes are not permitted.</p>
      </div>
      <a href="dashboard.html" class="bg-white/20 text-white text-sm px-4 py-2 rounded-xl hover:bg-white/30 transition border border-white/30">← Dashboard</a>
    </div>
  </div>

  <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8">
    <div id="users-table">
      <div class="text-gray-400 text-sm p-6 text-center">Loading users...</div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script>
    $(function () {
      setupAjax();
      adminGuard();
      $('#nav-placeholder').load('partials/nav.html');
      $('#footer-placeholder').load('partials/footer.html');

      function load() {
        $.get(BASE_URL + '/api/users').done(res => {
          const users = res.data || [];
          if (!users.length) {
            $('#users-table').html('<div class="text-center py-12 text-gray-400"><p class="text-3xl mb-2">👥</p><p>No users found.</p></div>');
            return;
          }
          const rows = users.map(u => {
            const initials = u.full_name ? u.full_name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2) : '?';
            return `<tr class="hover:bg-gray-50 transition">
              <td class="px-4 py-3">
                <div class="flex items-center gap-3">
                  <div class="w-9 h-9 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 text-xs font-bold flex-shrink-0">${initials}</div>
                  <div>
                    <p class="text-sm font-semibold text-gray-800">${u.full_name}</p>
                    <p class="text-xs text-gray-400">${u.email}</p>
                  </div>
                </div>
              </td>
              <td class="px-4 py-3"><span class="badge ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-600'}">${u.role}</span></td>
              <td class="px-4 py-3"><span class="badge ${u.is_active ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
              <td class="px-4 py-3">
                <button class="toggle-user text-xs px-3 py-1.5 rounded-lg border transition ${u.is_active ? 'bg-red-50 text-red-600 border-red-200 hover:bg-red-100' : 'bg-green-50 text-green-700 border-green-200 hover:bg-green-100'}" data-id="${u.id}" data-active="${u.is_active}">${u.is_active ? 'Disable' : 'Enable'}</button>
              </td>
            </tr>`;
          }).join('');
          $('#users-table').html(`<div class="overflow-x-auto rounded-2xl border border-gray-100 shadow-sm"><table class="w-full text-left bg-white"><thead class="bg-gray-50 border-b border-gray-100"><tr><th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">User</th><th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Role</th><th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Status</th><th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Actions</th></tr></thead><tbody class="divide-y divide-gray-50">${rows}</tbody></table></div>`);
        });
      }

      load();

      $(document).on('click', '.toggle-user', function () {
        const id = $(this).data('id');
        const active = $(this).data('active');
        const $btn = $(this);
        $btn.prop('disabled', true);
        $.ajax({ url: BASE_URL + '/api/users/' + id + '/' + (active ? 'disable' : 'enable'), method: 'PATCH' })
          .done(() => { showToast('User updated.', 'success'); load(); })
          .fail(() => $btn.prop('disabled', false));
      });
    });
  </script>
</body>
</html>
