<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promo Form — CivicEvents+</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="css/custom.css">
  <script src="js/config.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <div id="nav-placeholder"></div>

  <main class="flex-1 max-w-2xl mx-auto w-full px-4 py-8">
    <a href="promos.html" class="inline-flex items-center gap-1 text-indigo-600 text-sm hover:underline mb-6">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Back to Promos
    </a>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 auth-card">
      <h1 id="form-title" class="text-xl font-bold text-gray-800 mb-6">Create Promo</h1>
      <form id="promo-form" enctype="multipart/form-data" novalidate>

        <div class="mb-5">
          <label for="title" class="block text-sm font-medium text-gray-700 mb-1.5">Title <span class="text-red-500">*</span></label>
          <input id="title" name="title" type="text" required class="form-input" placeholder="Promo title">
        </div>

        <div class="mb-5">
          <label for="description" class="block text-sm font-medium text-gray-700 mb-1.5">Description <span class="text-red-500">*</span></label>
          <textarea id="description" name="description" rows="3" required class="form-input" placeholder="Describe this promo..."></textarea>
        </div>

        <div class="mb-5">
          <label for="caption_text" class="block text-sm font-medium text-gray-700 mb-1.5">Caption Text <span class="text-red-500">*</span></label>
          <textarea id="caption_text" name="caption_text" rows="3" required class="form-input" placeholder="Captions / transcript for accessibility..."></textarea>
          <p class="text-xs text-gray-400 mt-1">This text will be shown as captions and transcript for accessibility.</p>
        </div>

        <div class="mb-5">
          <label for="video" class="block text-sm font-medium text-gray-700 mb-1.5">Video File <span class="text-red-500">*</span></label>
          <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 text-center hover:border-indigo-300 transition">
            <input id="video" name="video" type="file" accept="video/*" class="hidden" aria-describedby="video-hint">
            <label for="video" class="cursor-pointer">
              <svg class="w-8 h-8 text-gray-300 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
              <p class="text-sm text-gray-500">Click to upload video</p>
              <p id="video-hint" class="text-xs text-gray-400 mt-1">MP4, MOV, AVI, MKV — max 500MB</p>
            </label>
            <p id="file-info" class="text-xs text-indigo-600 mt-2 font-medium"></p>
          </div>
        </div>

        <div class="mb-6 flex items-center gap-3 p-4 bg-gray-50 rounded-xl">
          <input id="published" name="published" type="checkbox" class="w-4 h-4 accent-indigo-600">
          <div>
            <label for="published" class="text-sm font-medium text-gray-700 cursor-pointer">Publish immediately</label>
            <p class="text-xs text-gray-400">Unpublished promos are only visible to admins.</p>
          </div>
        </div>

        <progress id="upload-progress" class="hidden mb-4" value="0" max="100" aria-label="Upload progress"></progress>

        <div class="flex gap-3">
          <button id="submit-btn" type="submit" class="btn-primary">Save Promo</button>
          <a href="promos.html" class="px-5 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-600 hover:bg-gray-50 transition">Cancel</a>
        </div>
      </form>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/promos.js"></script>
  <script>
    $(function () {
      setupAjax();
      $('#nav-placeholder').load('partials/nav.html');
      $('#footer-placeholder').load('partials/footer.html');
    });
  </script>
</body>
</html>
