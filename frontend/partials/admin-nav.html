<script>
$(function () {
  const user = getUser();
  if (user) {
    const initials = user.full_name ? user.full_name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2) : 'A';
    $('#admin-nav-avatar').text(initials);
    $('#admin-nav-username').text(user.full_name);
    $('#admin-dropdown-name').text(user.full_name);
  }

  // Profile dropdown
  $('#admin-profile-btn').on('click', function (e) {
    e.stopPropagation();
    const open = $('#admin-profile-dropdown').hasClass('hidden');
    $('#admin-profile-dropdown').toggleClass('hidden', !open);
    $(this).attr('aria-expanded', open);
  });
  $(document).on('click', function (e) {
    if (!$('#admin-profile-menu').is(e.target) && !$('#admin-profile-menu').has(e.target).length) {
      $('#admin-profile-dropdown').addClass('hidden');
    }
  });

  // Logout
  $('#admin-logout-btn, #admin-logout-btn-mobile').on('click', () => logout());

  // Mobile menu
  $('#admin-mobile-menu-btn').on('click', () => $('#admin-mobile-menu').toggleClass('hidden'));

  // Nav tab clicks — delegate to dashboard switchTab
  $(document).on('click', '.admin-nav-tab', function () {
    const tab = $(this).data('tab');
    if (typeof switchTab === 'function') switchTab(tab);
    $('#admin-mobile-menu').addClass('hidden');
  });
});
</script>
