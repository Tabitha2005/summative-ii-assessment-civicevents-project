<script>
$(function () {
  const user = getUser();
  if (user) {
    const initials = user.full_name ? user.full_name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) : '?';
    $('#nav-avatar').text(initials);
    $('#nav-username').text(user.full_name);
    $('#dropdown-name').text(user.full_name);
    $('#dropdown-role').text(user.role);
    if (isAdmin()) { $('#admin-nav-link, #admin-nav-link-mobile').removeClass('hidden'); }
  }

  // Profile dropdown
  $('#profile-btn').on('click', function (e) {
    e.stopPropagation();
    const open = $('#profile-dropdown').hasClass('hidden');
    $('#profile-dropdown').toggleClass('hidden', !open);
    $(this).attr('aria-expanded', open);
  });
  $(document).on('click', function (e) {
    if (!$('#profile-menu').is(e.target) && !$('#profile-menu').has(e.target).length) {
      $('#profile-dropdown').addClass('hidden');
    }
  });

  // Logout
  $('#logout-btn, #logout-btn-mobile').on('click', () => logout());

  // Mobile menu
  $('#mobile-menu-btn').on('click', () => $('#mobile-menu').toggleClass('hidden'));

  // Bell / drawer
  $('#bell-btn').on('click', function () {
    $('#notif-drawer').removeClass('translate-x-full');
    $('#notif-overlay').removeClass('hidden');
  });
  $('#close-drawer, #notif-overlay').on('click', function () {
    $('#notif-drawer').addClass('translate-x-full');
    $('#notif-overlay').addClass('hidden');
  });

  // Nav search
  $('#nav-search, #nav-search-mobile').on('keydown', function (e) {
    if (e.key === 'Enter') {
      const q = $(this).val().trim();
      if (q) window.location.href = 'events.html?q=' + encodeURIComponent(q);
    }
  });

  loadNotificationBadge();
});
</script>
