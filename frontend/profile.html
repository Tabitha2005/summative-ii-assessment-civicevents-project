<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — CivicEvents+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="css/custom.css">
  <script src="js/config.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <div id="nav-placeholder"></div>

  <!-- ═══ HERO ═══ -->
  <div class="page-hero hero-profile hero-dots">
    <!-- Glowing orbs -->
    <div class="absolute top-0 right-0 w-72 h-72 bg-indigo-600/20 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-48 h-48 bg-purple-600/15 rounded-full blur-2xl pointer-events-none"></div>

    <div class="hero-content max-w-7xl mx-auto px-4 sm:px-6 pt-10 pb-16 sm:pt-14 sm:pb-20">
      <div class="flex items-center gap-2 text-slate-500 text-xs font-medium mb-5">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span>Home</span><span class="text-slate-700">›</span><span class="text-white">Profile</span>
      </div>

      <!-- Profile identity row -->
      <div class="flex items-center gap-5 flex-wrap">
        <!-- Large avatar -->
        <div id="hero-avatar" class="w-20 h-20 sm:w-24 sm:h-24 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-3xl sm:text-4xl font-extrabold shadow-2xl shadow-indigo-900/50 flex-shrink-0 border-2 border-white/20">
          ?
        </div>
        <div>
          <p id="hero-name" class="text-2xl sm:text-3xl font-extrabold text-white mb-1" style="font-family:'Plus Jakarta Sans',sans-serif">Your Profile</p>
          <div class="flex items-center gap-2 flex-wrap">
            <span id="hero-role-badge" class="text-xs font-semibold px-2.5 py-1 rounded-full bg-indigo-500/30 border border-indigo-400/40 text-indigo-200 capitalize"></span>
            <span id="hero-status-badge" class="text-xs font-semibold px-2.5 py-1 rounded-full bg-emerald-500/20 border border-emerald-400/30 text-emerald-300"></span>
          </div>
          <p class="text-slate-500 text-sm mt-2">Manage your account information and preferences.</p>
        </div>
      </div>
    </div>

    <div class="hero-blur-panel"></div>
    <div class="hero-wave">
      <svg viewBox="0 0 1440 48" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M0 32L80 29.3C160 26.7 320 21.3 480 18.7C640 16 800 16 960 18.7C1120 21.3 1280 26.7 1360 29.3L1440 32V48H1360C1280 48 1120 48 960 48C800 48 640 48 480 48C320 48 160 48 80 48H0Z" fill="#f8fafc"/>
      </svg>
    </div>
  </div>

  <main class="flex-1 max-w-xl mx-auto w-full px-4 py-8" id="profile-page">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 auth-card">
      <h2 class="font-bold text-slate-800 text-lg mb-6">Edit Information</h2>
      <form id="profile-form" novalidate>
        <div class="mb-5">
          <label for="full_name" class="block text-sm font-medium text-slate-700 mb-1.5">Full Name</label>
          <input id="full_name" name="full_name" type="text" required class="form-input">
        </div>
        <div class="mb-5">
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
          <input id="email" name="email" type="email" required class="form-input">
          <p id="email-error" class="hidden text-xs text-red-500 mt-1.5 flex items-center gap-1">⚠️ Email already in use.</p>
        </div>

        <!-- Read-only info box -->
        <div class="mb-6 p-4 bg-slate-50 rounded-xl border border-slate-100">
          <div class="flex items-center gap-2 mb-3">
            <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <p class="text-xs text-slate-400 font-semibold uppercase tracking-wide">Read-only fields</p>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <p class="text-xs text-slate-400 mb-1">Role</p>
              <p id="role-display" class="text-sm font-semibold text-slate-700 capitalize"></p>
            </div>
            <div>
              <p class="text-xs text-slate-400 mb-1">Account Status</p>
              <p id="status-display" class="text-sm font-semibold text-slate-700"></p>
            </div>
          </div>
        </div>

        <button id="save-btn" type="submit" class="btn-primary w-full justify-center py-3">Save Changes</button>
      </form>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/users.js"></script>
  <script>
    $(function () {
      setupAjax();
      // Populate hero from stored user immediately (before API call)
      const u = getUser();
      if (u) {
        const initials = u.full_name ? u.full_name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) : '?';
        $('#hero-avatar').text(initials);
        $('#hero-name').text(u.full_name || 'Your Profile');
        $('#hero-role-badge').text(u.role || '');
      }
      $('#nav-placeholder').load('partials/nav.html');
      $('#footer-placeholder').load('partials/footer.html');
    });
  </script>
</body>
</html>
