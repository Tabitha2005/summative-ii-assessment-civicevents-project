<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — CivicEvents+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="css/custom.css">
  <script src="js/config.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <div id="nav-placeholder"></div>

  <!-- ═══ HERO ═══ -->
  <div class="page-hero hero-announcements hero-dots">
    <!-- Glowing orbs -->
    <div class="absolute top-4 right-8 w-72 h-72 bg-blue-400/20 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute -bottom-8 left-12 w-56 h-56 bg-cyan-400/15 rounded-full blur-2xl pointer-events-none"></div>

    <!-- Sound wave decoration -->
    <div class="absolute right-6 top-1/2 -translate-y-1/2 hidden lg:flex items-end gap-1 opacity-20 pointer-events-none" aria-hidden="true">
      <div class="w-1.5 bg-white rounded-full" style="height:20px"></div>
      <div class="w-1.5 bg-white rounded-full" style="height:40px"></div>
      <div class="w-1.5 bg-white rounded-full" style="height:60px"></div>
      <div class="w-1.5 bg-white rounded-full" style="height:80px"></div>
      <div class="w-1.5 bg-white rounded-full" style="height:100px"></div>
      <div class="w-1.5 bg-white rounded-full" style="height:80px"></div>
      <div class="w-1.5 bg-white rounded-full" style="height:60px"></div>
      <div class="w-1.5 bg-white rounded-full" style="height:40px"></div>
      <div class="w-1.5 bg-white rounded-full" style="height:20px"></div>
    </div>

    <div class="hero-content max-w-7xl mx-auto px-4 sm:px-6 pt-12 pb-16 sm:pt-16 sm:pb-20">
      <div class="flex items-center gap-2 text-blue-300 text-xs font-medium mb-4">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span>Home</span><span class="text-blue-500">›</span><span class="text-white">Announcements</span>
      </div>

      <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-6">
        <div>
          <div class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-sm border border-white/20 text-white text-xs font-semibold px-3 py-1.5 rounded-full mb-4">
            <span class="text-base">📢</span> Official Updates
          </div>
          <h1 class="text-3xl sm:text-4xl lg:text-5xl font-extrabold text-white leading-tight mb-3" style="font-family:'Plus Jakarta Sans',sans-serif">
            Community<br class="hidden sm:block"> Announcements
          </h1>
          <p class="text-blue-200 text-sm sm:text-base max-w-lg leading-relaxed">
            Official audio updates and notices from your local city authorities.
          </p>
        </div>
        <!-- ROLE-BASED GUARD: admin only -->
        <div id="admin-create-btn" class="hidden flex-shrink-0">
          <a href="announcement-form.html" class="inline-flex items-center gap-2 bg-white text-blue-700 font-semibold text-sm px-5 py-2.5 rounded-xl hover:bg-blue-50 transition shadow-lg">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            New Announcement
          </a>
        </div>
      </div>
    </div>

    <div class="hero-blur-panel"></div>
    <div class="hero-wave">
      <svg viewBox="0 0 1440 48" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M0 32L80 26.7C160 21.3 320 10.7 480 8C640 5.3 800 10.7 960 16C1120 21.3 1280 26.7 1360 29.3L1440 32V48H1360C1280 48 1120 48 960 48C800 48 640 48 480 48C320 48 160 48 80 48H0Z" fill="#f8fafc"/>
      </svg>
    </div>
  </div>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-8">
    <div id="announcements-list" class="media-grid"></div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/announcements.js"></script>
  <script>
    $(function () {
      setupAjax();
      authGuard();
      if (isAdmin()) $('#admin-create-btn').removeClass('hidden');
      $('#nav-placeholder').load('partials/nav.html');
      $('#footer-placeholder').load('partials/footer.html');
    });
  </script>
</body>
</html>
