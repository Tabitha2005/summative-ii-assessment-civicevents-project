<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promos — CivicEvents+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="css/custom.css">
  <script src="js/config.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <div id="nav-placeholder"></div>

  <!-- ═══ HERO ═══ -->
  <div class="page-hero hero-promos hero-dots">
    <div class="absolute top-0 left-1/4 w-80 h-80 bg-fuchsia-500/20 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-0 right-1/4 w-64 h-64 bg-violet-400/20 rounded-full blur-2xl pointer-events-none"></div>

    <!-- Film strip decoration -->
    <div class="absolute right-0 top-0 bottom-0 w-14 hidden lg:flex flex-col opacity-[0.07] pointer-events-none overflow-hidden" aria-hidden="true">
      <div class="flex-1 border-l-4 border-white flex flex-col justify-around px-2 gap-2 py-4">
        <div class="h-7 bg-white rounded-sm"></div>
        <div class="h-7 bg-white rounded-sm"></div>
        <div class="h-7 bg-white rounded-sm"></div>
        <div class="h-7 bg-white rounded-sm"></div>
        <div class="h-7 bg-white rounded-sm"></div>
      </div>
    </div>

    <div class="hero-content max-w-7xl mx-auto px-4 sm:px-6 pt-12 pb-16 sm:pt-16 sm:pb-20">
      <div class="flex items-center gap-2 text-purple-300 text-xs font-medium mb-4">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span>Home</span><span class="text-purple-500">›</span><span class="text-white">Promos</span>
      </div>

      <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-6">
        <div>
          <div class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-sm border border-white/20 text-white text-xs font-semibold px-3 py-1.5 rounded-full mb-4">
            <span class="text-base">🎬</span> City Campaigns
          </div>
          <h1 class="text-3xl sm:text-4xl lg:text-5xl font-extrabold text-white leading-tight mb-3" style="font-family:'Plus Jakarta Sans',sans-serif">
            City Promo<br class="hidden sm:block"> Videos
          </h1>
          <p class="text-purple-200 text-sm sm:text-base max-w-lg leading-relaxed">
            Watch official campaigns, city highlights, and civic promotional content.
          </p>
          <div class="flex items-center gap-3 mt-5 flex-wrap">
            <div class="flex items-center gap-2 bg-white/10 backdrop-blur-sm border border-white/15 rounded-xl px-3 py-2">
              <svg class="w-4 h-4 text-purple-300" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              <span class="text-white text-xs font-semibold">Watch anytime</span>
            </div>
            <div class="flex items-center gap-2 bg-white/10 backdrop-blur-sm border border-white/15 rounded-xl px-3 py-2">
              <svg class="w-4 h-4 text-purple-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
              <span class="text-white text-xs font-semibold">Captions included</span>
            </div>
          </div>
        </div>
        <!-- ROLE-BASED GUARD: admin only -->
        <div id="admin-create-btn" class="hidden flex-shrink-0">
          <a href="promo-form.html" class="inline-flex items-center gap-2 bg-white text-purple-700 font-semibold text-sm px-5 py-2.5 rounded-xl hover:bg-purple-50 transition shadow-lg">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Upload Promo
          </a>
        </div>
      </div>
    </div>

    <div class="hero-blur-panel"></div>
    <div class="hero-wave">
      <svg viewBox="0 0 1440 48" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M0 16L48 18.7C96 21.3 192 26.7 288 29.3C384 32 480 32 576 29.3C672 26.7 768 21.3 864 18.7C960 16 1056 16 1152 18.7C1248 21.3 1344 26.7 1392 29.3L1440 32V48H1392C1344 48 1248 48 1152 48C1056 48 960 48 864 48C768 48 672 48 576 48C480 48 384 48 288 48C192 48 96 48 48 48H0Z" fill="#f8fafc"/>
      </svg>
    </div>
  </div>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-8">
    <div id="promos-list" class="media-grid"></div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/promos.js"></script>
  <script>
    $(function () {
      setupAjax();
      authGuard();
      if (isAdmin()) $('#admin-create-btn').removeClass('hidden');
      $('#nav-placeholder').load('partials/nav.html');
      $('#footer-placeholder').load('partials/footer.html');
    });
  </script>
</body>
</html>
