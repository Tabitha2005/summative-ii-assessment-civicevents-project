<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — CivicEvents+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="css/custom.css">
  <script src="js/config.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <div id="nav-placeholder"></div>

  <!-- ═══ HERO ═══ -->
  <div class="page-hero hero-events hero-dots">
    <!-- Glowing orbs -->
    <div class="absolute top-0 right-0 w-96 h-96 bg-purple-500/20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3 pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-64 h-64 bg-indigo-400/20 rounded-full blur-2xl translate-y-1/2 -translate-x-1/4 pointer-events-none"></div>

    <div class="hero-content max-w-7xl mx-auto px-4 sm:px-6 pt-12 pb-16 sm:pt-16 sm:pb-20">
      <!-- Breadcrumb -->
      <div class="flex items-center gap-2 text-indigo-300 text-xs font-medium mb-4">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span>Home</span>
        <span class="text-indigo-500">›</span>
        <span class="text-white">Events</span>
      </div>

      <div class="flex flex-col lg:flex-row lg:items-end justify-between gap-6">
        <div>
          <div class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-sm border border-white/20 text-white text-xs font-semibold px-3 py-1.5 rounded-full mb-4">
            <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
            Live Events
          </div>
          <h1 class="text-3xl sm:text-4xl lg:text-5xl font-extrabold text-white leading-tight mb-3" style="font-family:'Plus Jakarta Sans',sans-serif">
            Discover City<br class="hidden sm:block"> Events
          </h1>
          <p class="text-indigo-200 text-sm sm:text-base max-w-lg leading-relaxed">
            Register for community events, town halls, and civic gatherings happening near you.
          </p>
        </div>

        <!-- Floating stat pills -->
        <div class="flex gap-3 flex-wrap lg:flex-col lg:items-end">
          <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-2xl px-4 py-3 text-white text-center min-w-[90px]">
            <p class="text-2xl font-extrabold leading-none">🗓</p>
            <p class="text-xs text-indigo-200 mt-1 font-medium">Browse Events</p>
          </div>
          <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-2xl px-4 py-3 text-white text-center min-w-[90px]">
            <p class="text-2xl font-extrabold leading-none">✅</p>
            <p class="text-xs text-indigo-200 mt-1 font-medium">Register Free</p>
          </div>
        </div>
      </div>

      <!-- Search bar inside hero -->
      <div class="mt-8 max-w-2xl">
        <div class="flex flex-col sm:flex-row gap-3 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-2">
          <div class="relative flex-1">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-indigo-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input id="search-input" type="search" placeholder="Search events by title or location…"
              class="w-full bg-white/90 text-slate-800 placeholder-slate-400 rounded-xl pl-9 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
              aria-label="Search events">
          </div>
          <select id="date-filter" class="bg-white/90 text-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 sm:w-36" aria-label="Filter by date">
            <option value="all">All Dates</option>
            <option value="upcoming">Upcoming</option>
            <option value="past">Past</option>
          </select>
          <select id="location-filter" class="bg-white/90 text-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 sm:w-40" aria-label="Filter by location">
            <option value="all">All Locations</option>
          </select>
        </div>
      </div>
    </div>

    <div class="hero-blur-panel"></div>
    <!-- Wave bottom -->
    <div class="hero-wave">
      <svg viewBox="0 0 1440 48" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M0 48L60 42.7C120 37.3 240 26.7 360 24C480 21.3 600 26.7 720 29.3C840 32 960 32 1080 29.3C1200 26.7 1320 21.3 1380 18.7L1440 16V48H1380C1320 48 1200 48 1080 48C960 48 840 48 720 48C600 48 480 48 360 48C240 48 120 48 60 48H0Z" fill="#f8fafc"/>
      </svg>
    </div>
  </div>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-8">
    <!-- Admin create button -->
    <div id="admin-create-btn" class="hidden flex justify-end mb-6">
      <a href="event-form.html" class="btn-primary">+ New Event</a>
    </div>

    <div id="events-list" class="media-grid"></div>

    <!-- Pagination -->
    <div class="flex items-center justify-center gap-3 mt-12">
      <button id="prev-page" class="px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-medium hover:bg-indigo-50 hover:border-indigo-300 hover:text-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed shadow-sm transition" aria-label="Previous page">← Prev</button>
      <span id="page-info" class="text-sm text-slate-500 font-medium px-2"></span>
      <button id="next-page" class="px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-medium hover:bg-indigo-50 hover:border-indigo-300 hover:text-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed shadow-sm transition" aria-label="Next page">Next →</button>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/events.js"></script>
  <script>
    $(function () {
      setupAjax();
      authGuard();
      if (isAdmin()) $('#admin-create-btn').removeClass('hidden');
      const q = new URLSearchParams(location.search).get('q');
      if (q) $('#search-input').val(q).trigger('input');
      $('#nav-placeholder').load('partials/nav.html');
      $('#footer-placeholder').load('partials/footer.html');
    });
  </script>
</body>
</html>
